<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Maintenance Calendar</title>

<link rel="stylesheet" href="calendar.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="bg-light">

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg bg-white border-bottom">

<div class="container-fluid">

<a class="navbar-brand fw-bold">J-AXON</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse justify-content-between" id="menu">

<ul class="navbar-nav mx-auto gap-3">

<li class="nav-item">
<a class="nav-link" href="#">Dashboard</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Inventory</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Tickets</a>
</li>

<li class="nav-item">
<a class="nav-link active fw-bold text-primary" href="#">Calendar</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Reports</a>
</li>

<li class="nav-item">
<a class="nav-link" href="#">Admin</a>
</li>

</ul>

<div>
<strong>Juan Pablo Cano</strong>
<span class="badge bg-secondary ms-2">Admin</span>
</div>

</div>

</div>

</nav>


<div class="container py-4">

<!-- HEADER -->

<div class="d-flex flex-wrap justify-content-between align-items-center mb-4">

<div>

<h3 class="fw-bold">Maintenance Calendar</h3>

<p class="text-muted mb-0">
Scheduling preventive maintenance and inspections
</p>

</div>

<button class="btn btn-dark">
+ Schedule Maintenance
</button>

</div>


<!-- STATS -->

<div class="row g-3 mb-4">

<div class="col-md-4">

<div class="card shadow-sm">

<div class="card-body">

<h6 class="text-muted">Scheduled</h6>
<h3>0</h3>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow-sm">

<div class="card-body">

<h6 class="text-danger">Overdue</h6>
<h3>7</h3>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card shadow-sm">

<div class="card-body">

<h6 class="text-success">Assets in Plan</h6>
<h3>6</h3>

</div>

</div>

</div>

</div>


<!-- CONTROLS -->

<div class="d-flex flex-wrap justify-content-between align-items-center mb-3">

<div class="d-flex align-items-center gap-2">

<button class="btn btn-outline-secondary" onclick="prevMonth()">‹</button>

<h5 id="monthLabel" class="mb-0"></h5>

<button class="btn btn-outline-secondary" onclick="nextMonth()">›</button>

</div>

<div class="d-flex gap-2">

<select class="form-select w-auto">
<option>All Types</option>
</select>

<button class="btn btn-outline-primary" onclick="goToday()">
Today
</button>

</div>

</div>


<!-- WEEK DAYS -->

<div class="row text-center fw-bold text-muted mb-2">

<div class="col">Sun</div>
<div class="col">Mon</div>
<div class="col">Tue</div>
<div class="col">Wed</div>
<div class="col">Thu</div>
<div class="col">Fri</div>
<div class="col">Sat</div>

</div>


<!-- CALENDAR -->

<div id="calendar" class="calendar"></div>

</div>


<script src="calendar.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
