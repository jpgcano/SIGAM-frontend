<!DOCTYPE html>
<html lang="en">

<head>
  <!-- ========================================= -->
  <!-- CONFIGURACIÓN BÁSICA DEL DOCUMENTO HTML -->
  <!-- ========================================= -->

  <!-- Codificación de caracteres -->
  <meta charset="UTF-8">

  <!-- Hace que el diseño sea responsive en móviles -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título que aparece en la pestaña del navegador -->
  <title>J-AXON | Admin</title>
    <link rel="icon" type="image/svg+xml" href="../services/logo_circular.png">


  <!-- ========================================= -->
  <!-- LIBRERÍAS Y ESTILOS -->
  <!-- ========================================= -->

  <!-- Framework Bootstrap para diseño y componentes -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Librería de iconos Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Hoja de estilos personalizada del panel admin -->
    <link rel="stylesheet" href="../css/global.css" />
<link rel="stylesheet" href="../css/pages/admin.css">

</head>

<body class="page-admin">

  <!-- ========================================= -->
  <!-- NAVBAR (MENÚ PRINCIPAL DEL SISTEMA) -->
  <!-- ========================================= -->

  <div id="app-navbar"></div>


  <!-- ========================================= -->
  <!-- CONTENIDO PRINCIPAL DEL PANEL ADMIN -->
  <!-- ========================================= -->

  <div class="p-4 bg-light min-vh-100 admin-container">

    <!-- Encabezado de la página -->
    <div class="mb-4">

      <h4 class="fw-bold mb-1">Administration Panel</h4>

      <small class="text-muted">
        System management
      </small>

    </div>


    <!-- ========================================= -->
    <!-- TARJETAS DE ESTADÍSTICAS DEL SISTEMA -->
    <!-- ========================================= -->

    <div class="row g-4 mb-4 admin-stats">

      <!-- Total de usuarios -->
      <div class="col-md-3">
        <div class="card border-0 shadow-sm p-4 rounded-4">

          <div class="d-flex justify-content-between">

            <div>
              <small class="text-muted">Total Users</small>
              <h4 id="statUsers" class="fw-bold mt-2">0</h4>
            </div>

            <i class="bi bi-people text-primary fs-4"></i>

          </div>

        </div>
      </div>


      <!-- Activos gestionados -->
      <div class="col-md-3">
        <div class="card border-0 shadow-sm p-4 rounded-4">

          <div class="d-flex justify-content-between">

            <div>
              <small class="text-muted">Managed Assets</small>
              <h4 id="statAssets" class="fw-bold mt-2">0</h4>
            </div>

            <i class="bi bi-hdd-stack text-primary fs-4"></i>

          </div>

        </div>
      </div>


      <!-- Tickets pendientes -->
      <div class="col-md-3">
        <div class="card border-0 shadow-sm p-4 rounded-4">

          <div class="d-flex justify-content-between">

            <div>
              <small class="text-muted">Pending Tickets</small>
              <h4 id="statTickets" class="fw-bold mt-2">0</h4>
            </div>

            <i class="bi bi-ticket text-primary fs-4"></i>

          </div>

        </div>
      </div>


      <!-- Estado del sistema -->
      <div class="col-md-3">
        <div class="card border-0 shadow-sm p-4 rounded-4">

          <div class="d-flex justify-content-between">

            <div>
              <small class="text-muted">System Status</small>
              <h5 class="fw-bold text-success mt-2">Optimal</h5>
              <small class="text-muted">99.8% uptime</small>
            </div>

            <i class="bi bi-bar-chart text-primary fs-4"></i>

          </div>

        </div>
      </div>

    </div>


    <!-- ========================================= -->
    <!-- MENÚ DE CONFIGURACIÓN DEL ADMIN -->
    <!-- ========================================= -->

    <ul class="nav nav-pills mb-4" id="admin-tabs">

      <li class="nav-item">
        <button class="nav-link active" data-section="users">Users</button>
      </li>

      <li class="nav-item">
        <button class="nav-link" data-section="configuration">Configuration</button>
      </li>

      <li class="nav-item">
        <button class="nav-link" data-section="security">Security</button>
      </li>

      <li class="nav-item">
        <button class="nav-link" data-section="backup">Backup</button>
      </li>

    </ul>


    <!-- ========================================= -->
    <!-- TABLA DE GESTIÓN DE USUARIOS -->
    <!-- ========================================= -->

    <div id="section-users" class="card border-0 shadow-sm rounded-4 p-4 admin-section">

      <!-- Encabezado de la tabla -->
      <div class="d-flex justify-content-between align-items-center mb-3">

        <h6 class="fw-semibold mb-0">
          User Management
        </h6>

        <!-- Botón para crear nuevo usuario -->
        <button class="btn btn-dark rounded-pill px-3"
                data-bs-toggle="modal"
                data-bs-target="#userModal">
          + New User
        </button>

      </div>


      <!-- Barra de búsqueda y filtros -->
      <div class="row mb-3">

        <!-- Buscador -->
        <div class="col-md-6">

          <div class="input-group">

            <span class="input-group-text">
              <i class="bi bi-search"></i>
            </span>

            <input id="searchInput"
                   type="text"
                   class="form-control"
                   placeholder="Search users...">

          </div>

        </div>

        <!-- Filtro por rol -->
        <div class="col-md-3">

          <select id="roleFilter" class="form-select">

            <option value="">All Roles</option>
            <option value="Gerente">Manager</option>
            <option value="Analista">Analyst</option>
            <option value="Tecnico">Technician</option>
            <option value="Auditor">Auditor</option>
            <option value="Usuario">User</option>

          </select>

        </div>

      </div>


      <!-- Tabla de usuarios -->
      <div class="table-responsive">
        <div id="adminStatus" class="small text-muted mb-2" aria-live="polite"></div>

        <table class="table align-middle">

          <thead class="text-muted">

            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
              <th>Last Access</th>
              <th>Actions</th>
            </tr>

          </thead>

          <!-- Aquí se insertan los usuarios dinámicamente con JavaScript -->
          <tbody id="userTable"></tbody>

        </table>

      </div>

    </div>

    <!-- ========================================= -->
    <!-- SECCIÓN CONFIGURACIÓN -->
    <!-- ========================================= -->

    <div id="section-configuration" class="card border-0 shadow-sm rounded-4 p-4 admin-section d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-semibold mb-0">System Configuration</h6>
      </div>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Company Name</label>
          <input id="configCompany" class="form-control" placeholder="J-AXON">
        </div>
        <div class="col-md-6">
          <label class="form-label">Default Role</label>
          <select id="configDefaultRole" class="form-select">
            <option value="Usuario">User</option>
            <option value="Analista">Analyst</option>
            <option value="Tecnico">Technician</option>
            <option value="Gerente">Manager</option>
            <option value="Auditor">Auditor</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Session Timeout (minutes)</label>
          <input id="configTimeout" type="number" class="form-control" value="60">
        </div>
        <div class="col-md-6">
          <label class="form-label">Notifications</label>
          <select id="configNotifications" class="form-select">
            <option>Enabled</option>
            <option>Disabled</option>
          </select>
        </div>
      </div>
      <div class="mt-4">
        <button id="configSave" class="btn btn-dark">Save Configuration</button>
        <span id="configStatus" class="ms-2 small text-muted"></span>
      </div>
    </div>

    <!-- ========================================= -->
    <!-- SECCIÓN SEGURIDAD -->
    <!-- ========================================= -->

    <div id="section-security" class="card border-0 shadow-sm rounded-4 p-4 admin-section d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-semibold mb-0">Security Settings</h6>
      </div>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Minimum Password Length</label>
          <input id="securityMinLength" type="number" class="form-control" value="8">
        </div>
        <div class="col-md-6">
          <label class="form-label">Require Special Characters</label>
          <select id="securitySpecial" class="form-select">
            <option>Yes</option>
            <option>No</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Require 2FA</label>
          <select id="security2fa" class="form-select">
            <option>No</option>
            <option>Yes</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Account Lockout (attempts)</label>
          <input id="securityLockout" type="number" class="form-control" value="5">
        </div>
      </div>
      <div class="mt-4">
        <button id="securitySave" class="btn btn-dark">Save Security</button>
        <span id="securityStatus" class="ms-2 small text-muted"></span>
      </div>
    </div>

    <!-- ========================================= -->
    <!-- SECCIÓN BACKUP -->
    <!-- ========================================= -->

    <div id="section-backup" class="card border-0 shadow-sm rounded-4 p-4 admin-section d-none">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h6 class="fw-semibold mb-0">Backup Management</h6>
      </div>
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Backup Frequency</label>
          <select id="backupFrequency" class="form-select">
            <option>Daily</option>
            <option>Weekly</option>
            <option>Monthly</option>
          </select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Retention (days)</label>
          <input id="backupRetention" type="number" class="form-control" value="30">
        </div>
      </div>
      <div class="mt-4 d-flex flex-wrap gap-2">
        <button id="backupRun" class="btn btn-dark">Run Backup</button>
        <button id="backupRestore" class="btn btn-outline-secondary">Restore Last Backup</button>
        <span id="backupStatus" class="ms-2 small text-muted"></span>
      </div>
    </div>

  </div>


  <!-- ========================================= -->
  <!-- MODAL PARA CREAR / EDITAR USUARIOS -->
  <!-- ========================================= -->

  <div class="modal fade" id="userModal">

    <div class="modal-dialog">

      <div class="modal-content">

        <!-- Título del modal -->
        <div class="modal-header">
          <h5 class="modal-title">User</h5>
        </div>

        <!-- Campos del formulario -->
        <div class="modal-body">

          <input id="name" class="form-control mb-2" placeholder="Name">

          <input id="email" class="form-control mb-2" placeholder="Email">

          <select id="role" class="form-select">
            <option value="Usuario">User</option>
            <option value="Analista">Analyst</option>
            <option value="Tecnico">Technician</option>
            <option value="Gerente">Manager</option>
            <option value="Auditor">Auditor</option>
          </select>

          <input id="password" type="password" class="form-control mt-2" placeholder="Password">

          <!-- Campo oculto usado para editar usuarios -->
          <input type="hidden" id="editIndex">

        </div>

        <!-- Botones -->
        <div class="modal-footer">

          <button class="btn btn-secondary" data-bs-dismiss="modal">
            Cancel
          </button>

          <button class="btn btn-dark" onclick="saveUser()">
            Save
          </button>

        </div>

      </div>

    </div>

  </div>


  <!-- ========================================= -->
  <!-- SCRIPTS DEL SISTEMA -->
  <!-- ========================================= -->

  <!-- Bootstrap JS -->
  <script src="../services/navbar.js"></script>
  <script src="../js/runtime-env.js"></script>
  <script src="../js/config.js"></script>
      <script src="../js/core/storage.js"></script>
    <script src="../js/core/endpoints.js"></script>
    <script src="../js/core/api-client.js"></script>
    <script src="../js/core/formatter.js"></script>
<script src="../js/api.js"></script>
  <script>
  window.SIGAM_PAGE_ROLES = ["Gerente", "Auditor"];
  </script>
  <script src="../services/auth-guard.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script que controla la lógica del panel admin -->
    <script src="../js/ui/base-page.js"></script>
  <script src="../js/pages/admin.page.js"></script>
<script src="../js/admin.js"></script>

</body>

</html>
