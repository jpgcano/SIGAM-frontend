<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" type="image/svg+xml" href="../services/logo_circular.png">

      <link rel="stylesheet" href="../css/global.css" />
<link rel="stylesheet" href="../css/pages/register.css">
</head>
<body class="page-register">

<div class="container">
    <h2>Create Account</h2>

    <form id="registerForm" novalidate>
        <input type="text" id="name" placeholder="Name" required>
        <input type="text" id="surname" placeholder="Surname" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
        <select id="role">
            <option value="Usuario">User</option>
            <option value="Analista">Analyst</option>
            <option value="Tecnico">Technician</option>
            <option value="Gerente">Manager</option>
            <option value="Auditor">Auditor</option>
        </select>
        <div id="registerStatus" aria-live="polite"></div>
        <button id="registerBtn" type="submit">Create Account</button>
    </form>

    <p>Do you already have an account?
    <a href="/login">Login</a>
    </p>
</div>

<script src="../js/runtime-env.js"></script>
    <script src="../js/config.js"></script>
    <script src="../js/core/storage.js"></script>
    <script src="../js/core/endpoints.js"></script>
    <script src="../js/core/api-client.js"></script>
    <script src="../js/core/formatter.js"></script>
<script src="../js/api.js"></script>
    <script src="../js/ui/base-page.js"></script>
    <script src="../js/pages/register.page.js"></script>
<script src="../js/register.js"></script>
</body>
</html>
